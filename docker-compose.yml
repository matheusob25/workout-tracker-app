services:
  postgres:
    image: postgres:18
    container_name: ${POSTGRES_CONTAINER_NAME:-postgres-nest}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: ${POSTGRES_INITDB_ARGS:--encoding-UTF8 -locale=C}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes: 
      - postgres_data_nest:${POSTGRES_DATA_PATH:-/var/lib/postgresql}
    networks:
      - postgres_network_nest

volumes:
  postgres_data_nest:
    driver: local
    name: ${POSTGRES_VOLUME_NAME:-postgres_data_nest}

networks:
  postgres_network_nest:
    driver: bridge
    name: ${POSTGRES_NETWORK_NAME:-postgres_network_nest}
